<div class="header">
  <h2>{{ 'ACCOUNTING.COA_TITLE' | translate }}</h2>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon>
    {{ 'ACCOUNTING.ADD_ACCOUNT' | translate }}
  </button>
</div>

<table mat-table [dataSource]="accountingService.accounts()" class="mat-elevation-z2">
  <ng-container matColumnDef="code">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.CODE' | translate }}</th>
    <td mat-cell *matCellDef="let acc">{{ acc.code }}</td>
  </ng-container>

  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.NAME' | translate }}</th>
    <td mat-cell *matCellDef="let acc">{{ acc.name }}</td>
  </ng-container>

  <ng-container matColumnDef="type">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.TYPE' | translate }}</th>
    <td mat-cell *matCellDef="let acc">{{ getAccountTypeName(acc.type) }}</td>
  </ng-container>

  <ng-container matColumnDef="balance">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.BALANCE' | translate }}</th>
    <td mat-cell *matCellDef="let acc">{{ acc.balance | currency }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
