<div class="header">
  <h2>{{ 'ACCOUNTING.JOURNALS_TITLE' | translate }}</h2>
  <button mat-raised-button color="primary" (click)="openDialog()">
    <mat-icon>add</mat-icon>
    {{ 'ACCOUNTING.ADD_JOURNAL' | translate }}
  </button>
</div>

<table mat-table [dataSource]="accountingService.journals()" class="mat-elevation-z2">
  <ng-container matColumnDef="referenceNumber">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.REF_NUMBER' | translate }}</th>
    <td mat-cell *matCellDef="let j">{{ j.referenceNumber }}</td>
  </ng-container>

  <ng-container matColumnDef="date">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.DATE' | translate }}</th>
    <td mat-cell *matCellDef="let j">{{ j.date | date }}</td>
  </ng-container>

  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.DESCRIPTION' | translate }}</th>
    <td mat-cell *matCellDef="let j">{{ j.description }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>{{ 'ACCOUNTING.STATUS' | translate }}</th>
    <td mat-cell *matCellDef="let j">{{ getStatusName(j.status) }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
